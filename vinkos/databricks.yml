# This is a Databricks asset bundle definition for vinkos.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: vinkos
  uuid: ac52ace6-27f2-4514-b828-2733a905b6dc

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-f1337422-4881.cloud.databricks.com
    variables:
      catalog: vinkos
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-f1337422-4881.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sebastianbrinezc@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sebastianbrinezc@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: vinkos
      schema: prod
    permissions:
      - user_name: sebastianbrinezc@gmail.com
        level: CAN_MANAGE
