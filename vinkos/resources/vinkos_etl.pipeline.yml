# The main pipeline for vinkos

resources:
  pipelines:
    vinkos_etl:
      name: vinkos_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/vinkos_etl"

      libraries:
        - glob:
            include: ../src/vinkos_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
